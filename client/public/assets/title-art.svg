<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f5fc8"/>
      <stop offset="0.5" stop-color="#5aa3ef"/>
      <stop offset="1" stop-color="#bfe6ff"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff8da"/>
      <stop offset="0.45" stop-color="#ffe98c" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#ffe98c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd06a"/><stop offset="1" stop-color="#52a842"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#62c14e"/><stop offset="1" stop-color="#3a8f31"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa1b0"/><stop offset="1" stop-color="#6c7281"/>
    </linearGradient>
    <linearGradient id="kart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6159"/><stop offset="1" stop-color="#c5201a"/>
    </linearGradient>
  </defs>

  <!-- SKY -->
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <circle cx="1310" cy="195" r="280" fill="url(#sun)"/>
  <circle cx="1310" cy="195" r="92" fill="#fff8df"/>

  <!-- subtle rainbow -->
  <g fill="none" stroke-width="15" opacity="0.32" stroke-linecap="round">
    <path d="M70 600 A 760 760 0 0 1 1530 600" stroke="#ff5d5d"/>
    <path d="M70 632 A 760 760 0 0 1 1530 632" stroke="#ffba4d"/>
    <path d="M70 664 A 760 760 0 0 1 1530 664" stroke="#fff04d"/>
    <path d="M70 696 A 760 760 0 0 1 1530 696" stroke="#5dff8a"/>
    <path d="M70 728 A 760 760 0 0 1 1530 728" stroke="#5db9ff"/>
    <path d="M70 760 A 760 760 0 0 1 1530 760" stroke="#c45dff"/>
  </g>

  <!-- clouds -->
  <g fill="#ffffff">
    <g transform="translate(330,210) scale(1.15)">
      <ellipse cx="0" cy="0" rx="70" ry="42"/><ellipse cx="-72" cy="14" rx="50" ry="32"/>
      <ellipse cx="72" cy="14" rx="50" ry="32"/><ellipse cx="0" cy="22" rx="104" ry="32"/>
    </g>
    <g transform="translate(900,140) scale(0.85)" opacity="0.95">
      <ellipse cx="0" cy="0" rx="70" ry="42"/><ellipse cx="-72" cy="14" rx="50" ry="32"/>
      <ellipse cx="72" cy="14" rx="50" ry="32"/><ellipse cx="0" cy="22" rx="104" ry="32"/>
    </g>
    <g transform="translate(1180,330) scale(0.7)" opacity="0.9">
      <ellipse cx="0" cy="0" rx="70" ry="42"/><ellipse cx="-72" cy="14" rx="50" ry="32"/>
      <ellipse cx="72" cy="14" rx="50" ry="32"/><ellipse cx="0" cy="22" rx="104" ry="32"/>
    </g>
  </g>

  <!-- far hills -->
  <path d="M0 560 Q 260 470 540 545 Q 820 612 1080 540 Q 1360 470 1600 552 L1600 1000 L0 1000 Z" fill="url(#hillFar)"/>

  <!-- Peach's castle on the far hill -->
  <g transform="translate(1255,548)">
    <rect x="-96" y="-118" width="192" height="120" rx="6" fill="#f3c4da" stroke="#d98fb4" stroke-width="3"/>
    <rect x="-120" y="-150" width="40" height="152" fill="#fdeef5"/>
    <rect x="80" y="-150" width="40" height="152" fill="#fdeef5"/>
    <polygon points="-100,-150 -60,-150 -80,-196" fill="#e24a8a"/>
    <polygon points="60,-150 100,-150 80,-196" fill="#e24a8a"/>
    <rect x="-36" y="-232" width="72" height="138" fill="#fdeef5" stroke="#ecd2de" stroke-width="2"/>
    <polygon points="-46,-232 46,-232 0,-300" fill="#e24a8a"/>
    <circle cx="0" cy="-308" r="7" fill="#ffd24a"/>
    <circle cx="0" cy="-188" r="18" fill="#ffe7b0" stroke="#e8a0c0" stroke-width="3"/>
    <rect x="-12" y="-150" width="24" height="40" rx="12" fill="#9a4060"/>
    <rect x="-104" y="-100" width="16" height="22" fill="#c98fae"/>
    <rect x="88" y="-100" width="16" height="22" fill="#c98fae"/>
  </g>

  <!-- near grass field -->
  <path d="M0 600 Q 400 560 820 600 Q 1200 636 1600 596 L1600 1000 L0 1000 Z" fill="url(#grass)"/>

  <!-- ROAD -->
  <path d="M748 606 L852 606 L1240 1000 L360 1000 Z" fill="url(#road)"/>
  <path d="M748 606 L758 606 L386 1000 L360 1000 Z" fill="#f4f4f4" opacity="0.9"/>
  <path d="M842 606 L852 606 L1240 1000 L1214 1000 Z" fill="#f4f4f4" opacity="0.9"/>
  <!-- centre dashes -->
  <g fill="#ffe27a" opacity="0.9">
    <polygon points="797,640 803,640 805,672 795,672"/>
    <polygon points="794,720 806,720 810,772 790,772"/>
    <polygon points="789,838 811,838 818,910 782,910"/>
  </g>

  <!-- distant start gate -->
  <g transform="translate(800,606)">
    <rect x="-86" y="-72" width="12" height="74" fill="#eaeaea"/>
    <rect x="74" y="-72" width="12" height="74" fill="#eaeaea"/>
    <rect x="-86" y="-86" width="172" height="26" fill="#1b2350"/>
    <g>
      <rect x="-84" y="-86" width="18" height="13" fill="#fff"/><rect x="-48" y="-86" width="18" height="13" fill="#fff"/>
      <rect x="-12" y="-86" width="18" height="13" fill="#fff"/><rect x="24" y="-86" width="18" height="13" fill="#fff"/>
      <rect x="60" y="-86" width="18" height="13" fill="#fff"/>
      <rect x="-66" y="-73" width="18" height="13" fill="#fff"/><rect x="-30" y="-73" width="18" height="13" fill="#fff"/>
      <rect x="6" y="-73" width="18" height="13" fill="#fff"/><rect x="42" y="-73" width="18" height="13" fill="#fff"/>
    </g>
  </g>

  <!-- ITEMS -->
  <!-- super mushroom -->
  <g transform="translate(286,452)">
    <path d="M-34,42 Q-42,112 0,120 Q42,112 34,42 Z" fill="#fbe8c8" stroke="#e8cfa6" stroke-width="3"/>
    <ellipse cx="-15" cy="84" rx="6.5" ry="13" fill="#5a3a1a"/><ellipse cx="15" cy="84" rx="6.5" ry="13" fill="#5a3a1a"/>
    <path d="M-74,44 A74,62 0 0 1 74,44 Z" fill="#e53227" stroke="#b3160f" stroke-width="5"/>
    <circle cx="-40" cy="14" r="15" fill="#fff"/><circle cx="32" cy="6" r="19" fill="#fff"/><circle cx="-4" cy="36" r="10" fill="#fff"/>
  </g>
  <!-- question block -->
  <g transform="translate(196,648) rotate(-7)">
    <rect x="-46" y="-46" width="92" height="92" rx="12" fill="#f2a13a" stroke="#9a5a14" stroke-width="6"/>
    <circle cx="-34" cy="-34" r="4.5" fill="#7a3f0c"/><circle cx="34" cy="-34" r="4.5" fill="#7a3f0c"/>
    <circle cx="-34" cy="34" r="4.5" fill="#7a3f0c"/><circle cx="34" cy="34" r="4.5" fill="#7a3f0c"/>
    <text x="0" y="22" font-family="'Arial Black',Arial,sans-serif" font-size="68" font-weight="900" text-anchor="middle" fill="#fff" stroke="#7a3f0c" stroke-width="4">?</text>
  </g>
  <!-- green shell -->
  <g transform="translate(372,832)">
    <path d="M-64,8 a64,46 0 0 1 128,0 Z" fill="#36c957" stroke="#1d7a33" stroke-width="5"/>
    <ellipse cx="0" cy="10" rx="64" ry="17" fill="#fff0d0" stroke="#e6cda6" stroke-width="3"/>
    <path d="M-40,-14 L-20,-30 M0,-34 L0,-30 M40,-14 L20,-30" stroke="#1d7a33" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- super star -->
  <g transform="translate(1248,352) rotate(-10)">
    <path d="M0,-62 L13.9,-19.2 L59,-19.2 L22.5,7.3 L36.5,50.2 L0,23.7 L-36.5,50.2 L-22.5,7.3 L-59,-19.2 L-13.9,-19.2 Z" fill="#ffe14d" stroke="#e0a400" stroke-width="6" stroke-linejoin="round"/>
    <ellipse cx="-15" cy="-4" rx="7" ry="13" fill="#3a2a00"/><ellipse cx="15" cy="-4" rx="7" ry="13" fill="#3a2a00"/>
  </g>
  <!-- banana -->
  <g transform="translate(1252,812) rotate(18)">
    <path d="M-52,28 Q-30,-44 54,-30 Q34,46 -52,28 Z" fill="#ffe14d" stroke="#d9a300" stroke-width="5"/>
    <path d="M54,-30 l12,-12" stroke="#6b4a12" stroke-width="9" stroke-linecap="round"/>
  </g>

  <!-- HERO KART + MARIO -->
  <ellipse cx="800" cy="958" rx="252" ry="40" fill="#05060f" opacity="0.32"/>
  <!-- speed lines -->
  <g stroke-linecap="round" opacity="0.55">
    <line x1="470" y1="700" x2="250" y2="690" stroke="#ffffff" stroke-width="10"/>
    <line x1="470" y1="760" x2="210" y2="760" stroke="#ffffff" stroke-width="8"/>
    <line x1="1130" y1="700" x2="1350" y2="690" stroke="#ffffff" stroke-width="10"/>
    <line x1="1130" y1="760" x2="1390" y2="760" stroke="#ffffff" stroke-width="8"/>
  </g>

  <g transform="translate(800,706)">
    <!-- rear tires -->
    <ellipse cx="-172" cy="120" rx="58" ry="68" fill="#15161b"/>
    <ellipse cx="-172" cy="120" rx="26" ry="31" fill="#cfd3da"/>
    <ellipse cx="172" cy="120" rx="58" ry="68" fill="#15161b"/>
    <ellipse cx="172" cy="120" rx="26" ry="31" fill="#cfd3da"/>
    <!-- body -->
    <path d="M-206,150 Q-228,42 -120,20 Q0,4 120,20 Q228,42 206,150 Q208,214 120,236 Q0,256 -120,236 Q-208,214 -206,150 Z" fill="url(#kart)" stroke="#9c130d" stroke-width="7"/>
    <!-- lower blue band -->
    <path d="M-206,158 Q0,196 206,158 Q208,214 120,236 Q0,256 -120,236 Q-208,214 -206,158 Z" fill="#234fc0"/>
    <!-- cockpit interior -->
    <ellipse cx="0" cy="42" rx="118" ry="44" fill="#241018"/>
    <!-- number roundel -->
    <circle cx="0" cy="206" r="40" fill="#ffffff" stroke="#9c130d" stroke-width="6"/>
    <text x="0" y="228" font-family="'Arial Black',Arial,sans-serif" font-size="56" font-weight="900" text-anchor="middle" fill="#e52521">1</text>

    <!-- MARIO -->
    <!-- overalls torso -->
    <path d="M-84,84 Q-92,-22 -38,-52 L38,-52 Q92,-22 84,84 Z" fill="#234fc0"/>
    <!-- shirt shoulders -->
    <ellipse cx="-58" cy="-34" rx="34" ry="30" fill="#e52521"/>
    <ellipse cx="58" cy="-34" rx="34" ry="30" fill="#e52521"/>
    <!-- overall straps + buttons -->
    <rect x="-30" y="-46" width="16" height="64" fill="#234fc0"/>
    <rect x="14" y="-46" width="16" height="64" fill="#234fc0"/>
    <circle cx="-22" cy="6" r="8" fill="#ffd24a"/><circle cx="22" cy="6" r="8" fill="#ffd24a"/>
    <!-- arms to wheel -->
    <path d="M-74,-22 Q-118,34 -52,78" fill="none" stroke="#e52521" stroke-width="36" stroke-linecap="round"/>
    <path d="M74,-22 Q118,34 52,78" fill="none" stroke="#e52521" stroke-width="36" stroke-linecap="round"/>
    <!-- steering wheel -->
    <circle cx="0" cy="92" r="56" fill="none" stroke="#2a2a2a" stroke-width="16"/>
    <circle cx="0" cy="92" r="15" fill="#444"/>
    <line x1="0" y1="92" x2="0" y2="40" stroke="#2a2a2a" stroke-width="9"/>
    <line x1="0" y1="92" x2="-46" y2="112" stroke="#2a2a2a" stroke-width="9"/>
    <line x1="0" y1="92" x2="46" y2="112" stroke="#2a2a2a" stroke-width="9"/>
    <!-- gloves -->
    <circle cx="-50" cy="80" r="22" fill="#ffffff" stroke="#d8d8d8" stroke-width="4"/>
    <circle cx="50" cy="80" r="22" fill="#ffffff" stroke="#d8d8d8" stroke-width="4"/>

    <!-- head -->
    <rect x="-22" y="-92" width="44" height="34" fill="#ffc59b"/>
    <circle cx="0" cy="-150" r="72" fill="#ffc59b"/>
    <circle cx="-70" cy="-150" r="15" fill="#ffbf94"/>
    <circle cx="70" cy="-150" r="15" fill="#ffbf94"/>
    <!-- hair / sideburns -->
    <path d="M-72,-150 Q-78,-118 -58,-104 Q-66,-132 -56,-150 Z" fill="#3a2412"/>
    <path d="M72,-150 Q78,-118 58,-104 Q66,-132 56,-150 Z" fill="#3a2412"/>
    <!-- cap dome -->
    <path d="M-74,-156 A74,66 0 0 1 74,-156 Z" fill="#e52521" stroke="#b3160f" stroke-width="5"/>
    <!-- cap brim -->
    <path d="M-30,-152 Q26,-178 96,-146 Q44,-132 -34,-146 Z" fill="#cc1c16" stroke="#9c130d" stroke-width="3"/>
    <!-- emblem -->
    <circle cx="0" cy="-180" r="20" fill="#ffffff"/>
    <text x="0" y="-172" font-family="'Arial Black',Arial,sans-serif" font-size="26" font-weight="900" text-anchor="middle" fill="#e52521">M</text>
    <!-- eyebrows -->
    <rect x="-40" y="-166" width="30" height="11" rx="5" fill="#3a2412"/>
    <rect x="10" y="-166" width="30" height="11" rx="5" fill="#3a2412"/>
    <!-- eyes -->
    <ellipse cx="-22" cy="-148" rx="13" ry="19" fill="#ffffff"/>
    <ellipse cx="22" cy="-148" rx="13" ry="19" fill="#ffffff"/>
    <circle cx="-19" cy="-145" r="8" fill="#2b50c8"/>
    <circle cx="25" cy="-145" r="8" fill="#2b50c8"/>
    <!-- nose -->
    <circle cx="2" cy="-128" r="27" fill="#ffb482" stroke="#efa274" stroke-width="2"/>
    <!-- mustache -->
    <path d="M-50,-116 Q-26,-100 0,-112 Q26,-100 50,-116 Q28,-82 0,-94 Q-28,-82 -50,-116 Z" fill="#3a2412"/>
  </g>

  <!-- foreground grass tufts -->
  <g fill="#2f7a28">
    <path d="M0 1000 Q 30 940 50 1000 Q 70 946 96 1000 Z"/>
    <path d="M1600 1000 Q 1570 944 1548 1000 Q 1524 950 1504 1000 Z"/>
  </g>
</svg>
